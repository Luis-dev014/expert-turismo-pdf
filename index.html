<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

// ============ FIRESTORE ============
const DB = {
  col(uid){ return db.collection('users').doc(uid).collection('quotes'); },
  async save(uid,q){
    try{
      const data={...q,updatedAt:new Date().toISOString()};
      await DB.col(uid).doc(q.id).set(data);
      // Espelha pra coleção pública (para o link de share funcionar sem auth)
      if(q.shareId){
        await db.collection('shared').doc(q.shareId).set({...data,ownerUid:uid});
      }
      return data;
    }catch(e){console.error('save:',e);return null;}
  },
  async list(uid){
    try{ const snap=await DB.col(uid).orderBy('updatedAt','desc').get(); return snap.docs.map(d=>d.data()); }
    catch(e){console.error('list:',e);return [];}
  },
  async del(uid,id,shareId){
    try{
      await DB.col(uid).doc(id).delete();
      if(shareId){ try{ await db.collection('shared').doc(shareId).delete(); }catch{} }
      return true;
    }catch(e){console.error('del:',e);return false;}
  },
  async getShared(shareId){
    try{ const doc=await db.collection('shared').doc(shareId).get(); return doc.exists?doc.data():null; }

};

// ============ HELPERS ============
const uid = () => Math.random().toString(36).slice(2,10);
const todayISO = () => new Date().toISOString().slice(0,10);
const CURRENCIES = {BRL:{symbol:'R$',locale:'pt-BR'},USD:{symbol:'US$',locale:'en-US'},EUR:{symbol:'€',locale:'de-DE'},GBP:{symbol:'£',locale:'en-GB'}};
const fmt = (v,c='BRL') => { const cur=CURRENCIES[c]; return `${cur.symbol} ${(Number(v)||0).toLocaleString(cur.locale,{minimumFractionDigits:2,maximumFractionDigits:2})}`; };
const fmtDate = iso => { if(!iso) return ''; return new Date(iso+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}); };
const fmtDateShort = iso => { if(!iso) return ''; return new Date(iso+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); };
const STATUS = {draft:{label:'Rascunho',color:'#64748b'},sent:{label:'Enviada',color:'#3b82f6'},approved:{label:'Aprovada',color:'#10b981'},rejected:{label:'Recusada',color:'#ef4444'}};

function normalizeQuote(q){
  if(!q) return q;
  const services = (q.services||[]).map(s=>{
    if(s.imageUrl && !s.images){ return {...s,images:[s.imageUrl],imageUrl:undefined,orientation:s.orientation||'portrait',serviceDate:s.serviceDate||''}; }
    return {...s,images:s.images||[],orientation:s.orientation||'portrait',serviceDate:s.serviceDate||''};
  });
  return {...q,orientation:q.orientation||'portrait',services,galleryConfig:q.galleryConfig||{columns:3,fixedHeight:true}};
}

const debounce = (fn,wait)=>{ let t; return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args),wait); }; };

async function loadImageAsBase64(source){
  if(typeof source!=='string') return source;
  if(!source.startsWith('http')) return source;
  const proxies=[source,`https://wsrv.nl/?url=${encodeURIComponent(source)}&output=jpg`,`https://corsproxy.io/?${encodeURIComponent(source)}`];
  for(const u of proxies){
    try{
      const r=await fetch(u,{mode:'cors'});
      if(!r.ok) continue;
      const blob=await r.blob();
      if(!blob.type.startsWith('image/')) continue;
      return await new Promise((res,rej)=>{const fr=new FileReader();fr.onloadend=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(blob);});
    }catch(e){}
  }
  return source;
}

function fileToBase64(file){
  return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=ev=>res(ev.target.result);fr.onerror=rej;fr.readAsDataURL(file);});
}

// ============ GEMINI ============
async function callGemini(prompt,imageBase64=null){
  const res = await fetch('/api/gemini',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt,imageBase64})
  });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  const d = await res.json();
  return d?.text||'';
}

  }catch(e){ return `Erro IA: ${e.message}`; }
}

// ============ PDF GENERATION ============
async function downloadPDF(quote,total,showToast,agency){
  agency = agency || loadAgency();
  showToast('Preparando PDF...','info');
  const container = document.getElementById('pdf-hidden');
  const isPrint = quote.template==='print';
  container.innerHTML = '';

  const pages = buildPDFPages(quote,total,isPrint,agency);

  for(const p of pages){
    const div = document.createElement('div');
    div.style.cssText = `width:${p.orientation==='landscape'?'297mm':'210mm'};height:${p.orientation==='landscape'?'210mm':'297mm'};background:#fff;overflow:hidden;page-break-after:always;`;
    div.innerHTML = p.html;
    div.dataset.orientation = p.orientation;
    container.appendChild(div);
  }

  await document.fonts.ready;
  await new Promise(r=>setTimeout(r,1500));

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({unit:'mm',format:'a4',orientation:'portrait',compress:true});

  const divs = container.children;
  for(let i=0;i<divs.length;i++){
    const div = divs[i];
    const orient = div.dataset.orientation;
    const w = orient==='landscape'?297:210;
    const h = orient==='landscape'?210:297;

    showToast(`Renderizando ${i+1} de ${divs.length}...`,'info');

    try{
      const canvas = await html2canvas(div,{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',logging:false,width:div.offsetWidth,height:div.offsetHeight});
      const imgData = canvas.toDataURL('image/jpeg',0.94);

      if(i>0) pdf.addPage([w,h],orient);
      else if(orient==='landscape'){ pdf.deletePage(1); pdf.addPage([w,h],orient); }

      pdf.addImage(imgData,'JPEG',0,0,w,h,undefined,'FAST');
    }catch(e){ console.error('Erro pág',i,e); }
  }

  const fname = `Proposta-${quote.client.name||'Cliente'}-${quote.trip.destination||'Viagem'}.pdf`.replace(/[^\w\-.]/g,'_');
  pdf.save(fname);
  container.innerHTML = '';
}

  cover.addText('PROPOSTA DE VIAGEM', {x:1, y:3.45, w:W-2, h:0.4, fontSize:14, color:GOLD, align:'center', bold:true, charSpacing:5});

  cover.addShape('rect', {x:6.16, y:5.35, w:1, h:0.04, fill:{color:GOLD}, line:{type:'none'}});

  // ============ SERVIÇOS ============

function buildPDFPages(quote,total,isPrint,agency){
  agency = agency || loadAgency();
  const orient = quote.orientation||'portrait';
  const pages = [];
  pages.push({orientation:orient,html:renderCoverHTML(quote,isPrint,agency)});
  pages.push(...renderDestinationGalleryHTML(quote,agency));
  quote.services.forEach((s,i)=>{
    pages.push({orientation:orient,html:renderServiceHTML(s,i,quote.currency,quote.services.length,agency,orient)});
  });
  pages.push({orientation:orient,html:renderSummaryFinancialHTML(quote,total,agency)});
  return pages;
}

function renderDestinationGalleryHTML(quote,agency){
  agency = agency || loadAgency();
  const gold='#d4af37';
  const cfg = quote.galleryConfig || {columns:3,fixedHeight:true};
  const cols = Math.max(2,Math.min(4,cfg.columns||3));
  const rows = 3;
  const perPg = cols * rows;
  const isLandscape = quote.orientation==='landscape';
  const W = isLandscape?'297mm':'210mm';
  const H = isLandscape?'210mm':'297mm';
  const imgH = cfg.fixedHeight ? (isLandscape?'82px':'108px') : 'auto';
  const objFit = cfg.fixedHeight ? 'cover' : 'contain';

  // Coleta todas as imagens: capa + serviços
  const imgs = [];
  if(quote.trip&&quote.trip.coverImageUrl) imgs.push(quote.trip.coverImageUrl);
  (quote.services||[]).forEach(s=>(s.images||[]).forEach(u=>{if(u) imgs.push(u);}));
  if(imgs.length===0) return [];

  const letterhead = `<div style="display:flex;align-items:center;gap:8px;padding:7px 30px;border-bottom:2px solid ${gold};background:#fff;">
    ${agency.logoUrl?`<img src="${agency.logoUrl}" style="height:20px;object-fit:contain;" crossorigin="anonymous"/>`:`<div style="width:20px;height:20px;border-radius:3px;background:${gold};display:flex;align-items:center;justify-content:center;color:#00294d;font-weight:900;font-size:7px;font-family:Georgia,serif;">ET</div>`}
    <div style="font-size:8px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;">${agency.name||'Expert Turismo'} · Galeria do Destino</div>
  </div>`;
  const watermark = agency.logoUrl
    ? `<img src="${agency.logoUrl}" crossorigin="anonymous" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:180px;opacity:0.04;pointer-events:none;z-index:0;object-fit:contain;"/>`
    : '';

  const totalPgs = Math.ceil(imgs.length/perPg);
  const pages = [];

  for(let pi=0;pi<imgs.length;pi+=perPg){
    const block = imgs.slice(pi,pi+perPg);
    const pgNum = Math.floor(pi/perPg)+1;
    const pgLabel = totalPgs>1 ? `<span style="font-size:9px;color:#94a3b8;">${pgNum} / ${totalPgs}</span>` : '';
    const html = `
    <div style="font-family:'DM Sans',sans-serif;background:#fff;width:${W};height:${H};overflow:hidden;position:relative;">
      ${watermark}
      ${letterhead}
      <div style="padding:16px 30px 14px;position:relative;z-index:1;">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid rgba(212,175,55,0.3);">
          <div>

            <h2 style="font-size:17px;font-weight:900;font-family:'Playfair Display',Georgia,serif;color:#00294d;margin:0;">${quote.trip.destination||'Destino'}</h2>
          </div>
          ${pgLabel}
        </div>
        <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:5px;">
          ${block.map(url=>`
            <div style="overflow:hidden;border-radius:4px;background:#f1f5f9;">
              <img src="${url}" crossorigin="anonymous"
                   style="width:100%;height:${imgH};object-fit:${objFit};object-position:center;display:block;"/>

    </div>`;
    pages.push({orientation:quote.orientation||'portrait',html});
  }
  return pages;

function renderServiceHTML(s,i,currency,totalSvcs,agency,orient){
  agency = agency || loadAgency();
  const gold='#d4af37';
  const isLandscape = (orient||s.orientation)==='landscape';
  const w = isLandscape?'297mm':'210mm';
  const h = isLandscape?'210mm':'297mm';
  const renderDesc = t => { if(!t) return '<em style="color:#94a3b8">Descrição do serviço...</em>'; return t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>'); };

  let imgsHTML = '';
  const imgs = s.images || [];
  const imgStyle = `object-fit:cover;object-position:center;display:block;`;
  if(imgs.length === 1){
    imgsHTML = `<img src="${imgs[0]}" style="width:100%;height:${isLandscape?'160px':'200px'};${imgStyle}" crossorigin="anonymous"/>`;
  } else if(imgs.length === 2){
    imgsHTML = `<div style="display:grid;grid-template-columns:2fr 1fr;gap:4px;">
      <img src="${imgs[0]}" style="width:100%;height:${isLandscape?'160px':'200px'};${imgStyle}" crossorigin="anonymous"/>
      <img src="${imgs[1]}" style="width:100%;height:${isLandscape?'160px':'200px'};${imgStyle}" crossorigin="anonymous"/>
    </div>`;
  } else if(imgs.length >= 3){
    imgsHTML = `
      <img src="${imgs[0]}" style="width:100%;height:${isLandscape?'110px':'150px'};${imgStyle};margin-bottom:4px;" crossorigin="anonymous"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
        <img src="${imgs[1]}" style="width:100%;height:${isLandscape?'75px':'95px'};${imgStyle}" crossorigin="anonymous"/>
        <img src="${imgs[2]}" style="width:100%;height:${isLandscape?'75px':'95px'};${imgStyle}" crossorigin="anonymous"/>

  }

  const letterheadHTML = `<div style="display:flex;align-items:center;gap:8px;padding:7px 30px;border-bottom:2px solid ${gold};background:#fff;">

    ? `<div style="width:100%;height:2px;background:linear-gradient(90deg,${gold},rgba(212,175,55,0.15) 70%,transparent);"></div>`
    : '';

  return `
  <div style="font-family:'DM Sans',sans-serif;background:#fff;width:${w};height:${h};overflow:hidden;position:relative;">
    ${watermarkHTML}
    ${letterheadHTML}

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="background:${gold};color:#00294d;font-size:11px;font-weight:900;padding:3px 10px;border-radius:4px;">${String(i+1).padStart(2,'0')}</span>

function LogoBadge({size=44,agency={}}){
  const gold='#d4af37';

function LoginScreen({onLogin}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);
  const gold='#d4af37';

  const handleLogin=async(e)=>{
    e.preventDefault();
    setError('');setLoading(true);
    try{
      const cred=await auth.signInWithEmailAndPassword(email,pass);
      onLogin(cred.user);
    }catch(err){
      const msgs={'auth/user-not-found':'Usuário não encontrado.','auth/wrong-password':'Senha incorreta.','auth/invalid-email':'Email inválido.','auth/invalid-credential':'Email ou senha incorretos.','auth/too-many-requests':'Muitas tentativas. Aguarde.'};
      setError(msgs[err.code]||'Erro: '+err.message);
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#07172a 0%,#0a1f3a 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem'}}>
      <div style={{width:'100%',maxWidth:420}} className="fade-in">
        <div style={{textAlign:'center',marginBottom:40}}>
          <div style={{marginBottom:16,display:'inline-block'}}><LogoBadge size={80} agency={loadAgency()}/></div>
          <h1 style={{fontFamily:'Playfair Display,Georgia,serif',fontSize:'2rem',fontWeight:900,color:'#fff',margin:'0 0 8px'}}>Expert Turismo Pro</h1>
          <p style={{color:'#64748b',fontSize:'0.9rem'}}>Faça login para acessar o sistema</p>
        </div>
        <form onSubmit={handleLogin} style={{background:'#0d2240',border:'1px solid #1e3a5f',borderRadius:16,padding:'2rem',boxShadow:'0 20px 50px rgba(0,0,0,0.4)'}}>
          <div style={{marginBottom:18}}>
            <label className="et-label">Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="et-input" placeholder="seu@email.com" required autoFocus style={{padding:'0.75rem'}}/>
          </div>
          <div style={{marginBottom:22}}>
            <label className="et-label">Senha</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} className="et-input" placeholder="••••••••" required style={{padding:'0.75rem'}}/>
          </div>
          {error&&<div style={{background:'#3b0a0a',border:'1px solid #7f1d1d',color:'#fca5a5',padding:'0.65rem 0.8rem',borderRadius:8,fontSize:'0.82rem',marginBottom:16}}>{error}</div>}
          <button type="submit" disabled={loading} className="et-btn-gold" style={{width:'100%',justifyContent:'center',padding:'0.8rem',fontSize:'0.95rem'}}>
            {loading?<span className="spin">⏳</span>:'🔓 Entrar'}
          </button>
        </form>
        <p style={{textAlign:'center',color:'#4a6580',fontSize:'0.75rem',marginTop:20}}>Acesso restrito a vendedores cadastrados.</p>
      </div>
    </div>
  );
}

  );
}

    if(!trip.destination){ alert('Defina um destino primeiro'); return; }

    <div className="et-modal-backdrop" onClick={onClose}>

        <div style={{background:'#071e38',border:'1px solid #1e3a5f',borderRadius:8,padding:'0.85rem',marginBottom:14,fontSize:'0.82rem'}}>
          <div style={{color:'#64748b',marginBottom:6}}>Vai gerar com base em:</div>
          <div style={{color:'#e2e8f0'}}>📍 <b>{trip.destination||'❌ defina o destino'}</b></div>
          <div style={{color:'#e2e8f0'}}>📅 {fmtDate(trip.startDate)} → {fmtDate(trip.endDate)}</div>

// ============ FLIGHT AI MODAL ============
function FlightAIModal({onClose,trip,onInsert}){
  const [tab,setTab]=useState('image');
  const [imgB64,setImgB64]=useState('');
  const [text,setText]=useState('');
  const [result,setResult]=useState('');
  const [loading,setLoading]=useState(false);
  const fileRef=useRef(null);
  const gold='#d4af37';

  const onFile=(file)=>{
    if(!file) return;
    const r=new FileReader();
    r.onload=e=>setImgB64(e.target.result);
    r.readAsDataURL(file);
  };

  const generate=async()=>{
    if(tab==='image' && !imgB64){ alert('Faça upload da imagem primeiro'); return; }
    if(tab==='text' && !text.trim()){ alert('Cole o texto da cotação primeiro'); return; }
    setLoading(true); setResult('');
    try{
      const r = await aiFlightSummary(tab==='image'?imgB64:null, tab==='text'?text:null, trip);
      setResult(r);
    }catch(e){ setResult('Erro: '+e.message); }
    setLoading(false);
  };

  return (
    <div className="et-modal-backdrop" onClick={onClose}>
      <div className="et-modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h2 style={{color:gold,fontFamily:'Playfair Display,Georgia,serif',fontSize:'1.4rem',fontWeight:900,margin:0}}>✈️ IA de Cotação Aérea</h2>
          <button onClick={onClose} style={{background:'transparent',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:24}}>×</button>
        </div>
        <p style={{color:'#94a3b8',fontSize:'0.85rem',marginBottom:16}}>Upload do print ou cole o texto. A IA formata no padrão profissional.</p>

        <div style={{display:'flex',gap:6,marginBottom:14,borderBottom:'1px solid #1e3a5f',paddingBottom:8}}>
          <button onClick={()=>setTab('image')} style={{flex:1,padding:'0.5rem',borderRadius:6,border:'none',cursor:'pointer',fontWeight:700,fontSize:'0.85rem',background:tab==='image'?gold:'transparent',color:tab==='image'?'#00294d':'#94a3b8'}}>📷 Upload</button>
          <button onClick={()=>setTab('text')} style={{flex:1,padding:'0.5rem',borderRadius:6,border:'none',cursor:'pointer',fontWeight:700,fontSize:'0.85rem',background:tab==='text'?gold:'transparent',color:tab==='text'?'#00294d':'#94a3b8'}}>📝 Texto</button>
        </div>

        {tab==='image' ? (
          <div style={{marginBottom:14}}>
            {imgB64 ? (
              <div style={{position:'relative'}}>
                <img src={imgB64} alt="" style={{width:'100%',maxHeight:300,objectFit:'contain',borderRadius:8,background:'#071e38'}}/>
                <button onClick={()=>setImgB64('')} style={{position:'absolute',top:8,right:8,background:'rgba(0,0,0,0.7)',border:'none',borderRadius:6,color:'#fff',cursor:'pointer',padding:'4px 10px'}}>✕ Trocar</button>
              </div>
            ) : (
              <button onClick={()=>fileRef.current?.click()} style={{width:'100%',padding:'2rem',border:`2px dashed ${gold}`,borderRadius:10,background:'#071e38',color:gold,cursor:'pointer',fontWeight:700}}>
                📷 Clique para selecionar imagem
              </button>
            )}
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>onFile(e.target.files?.[0])}/>
          </div>
        ) : (
          <textarea value={text} onChange={e=>setText(e.target.value)} rows={8} className="et-input" placeholder="Cole aqui o texto da cotação..." style={{marginBottom:14}}/>
        )}

        <button onClick={generate} disabled={loading} className="et-btn-gold" style={{width:'100%',justifyContent:'center',padding:'0.75rem',marginBottom:14}}>
          {loading?<><span className="spin">⏳</span>&nbsp;Analisando...</>:'✨ Gerar resumo formatado'}
        </button>

        {result && (
          <div style={{background:'#071e38',border:'1px solid #1e3a5f',borderRadius:8,padding:'1rem',marginBottom:14}}>
            <div style={{color:gold,fontSize:'0.75rem',fontWeight:700,textTransform:'uppercase',marginBottom:8}}>Resultado:</div>
            <pre style={{whiteSpace:'pre-wrap',color:'#e2e8f0',fontSize:'0.85rem',fontFamily:'inherit',margin:0,maxHeight:300,overflowY:'auto'}}>{result}</pre>
            <button onClick={()=>onInsert(result)} className="et-btn-gold" style={{marginTop:12,width:'100%',justifyContent:'center'}}>
              ✓ Adicionar como serviço de Voo
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ============ SERVICE CARD ============
function SvcCard({svc,idx,currency,aiState,onUp,onDel,onDup,onAI,onBeautify,onAddImg,onRemoveImg,onDragStart,onDragOver,onDrop,isDragging}){
  const [imgInput,setImgInput]=useState('');
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef(null);
  const gold='#d4af37';
  const imgs = svc.images || [];

  const handleFileDrop = e => {
    e.preventDefault(); e.stopPropagation();
    setDragOver(false);
    const f = e.dataTransfer?.files?.[0];
    if(f && f.type.startsWith('image/')){
      const r = new FileReader();
      r.onload = ev => onAddImg(ev.target.result);
      r.readAsDataURL(f);
    }
  };

  return (
    <div className={`et-svccard ${isDragging?'dragging':''}`} draggable onDragStart={onDragStart} onDragOver={onDragOver} onDrop={onDrop}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
        <span style={{color:'#4a6580',cursor:'grab',fontSize:14,userSelect:'none'}}>⋮⋮</span>
        <span style={{background:gold,color:'#00294d',fontSize:'0.65rem',fontWeight:900,padding:'2px 7px',borderRadius:4}}>#{idx+1}</span>
        <select value={svc.type} onChange={e=>onUp({type:e.target.value})} className="et-select" style={{flex:1,fontSize:'0.8rem',padding:'0.35rem 0.5rem'}}>
          {SVCTYPE.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
        </select>
        <button onClick={onDup} title="Duplicar" style={{background:'transparent',border:'none',cursor:'pointer',color:'#94a3b8',padding:4,fontSize:14}}>📋</button>
        <button onClick={onDel} title="Excluir" style={{background:'transparent',border:'none',cursor:'pointer',color:'#ef4444',padding:4,fontSize:14}}>🗑</button>
      </div>

      <input type="text" value={svc.title} onChange={e=>onUp({title:e.target.value})} className="et-input" placeholder="Título do serviço" style={{marginBottom:8}}/>

      <div style={{marginBottom:8}}>
        <label style={{fontSize:'0.65rem',color:'#64748b',display:'block',marginBottom:2}}>📅 Data do serviço</label>
        <input type="date" value={svc.serviceDate||''} onChange={e=>onUp({serviceDate:e.target.value})} className="et-input" style={{fontSize:'0.75rem'}}/>
      </div>

      <div style={{position:'relative',marginBottom:4}}>
        <textarea value={svc.description} onChange={e=>onUp({description:e.target.value})} rows={5} className="et-input" placeholder="Descrição..." style={{paddingBottom:36}}/>
        <div style={{position:'absolute',bottom:6,right:6,display:'flex',gap:4}}>
          <button onClick={onBeautify} disabled={!!aiState}
            style={{padding:'4px 9px',borderRadius:4,border:'none',background:aiState==='beautify'?'#374151':'#0369a1',color:'#fff',fontSize:'0.68rem',fontWeight:700,cursor:aiState?'not-allowed':'pointer',opacity:aiState?0.7:1}}>
            💄 {aiState==='beautify'?'...':'Embelezar'}
          </button>
          <button onClick={onAI} disabled={!!aiState}
            style={{padding:'4px 9px',borderRadius:4,border:'none',background:aiState==='gen'?'#374151':'#7c3aed',color:'#fff',fontSize:'0.68rem',fontWeight:700,cursor:aiState?'not-allowed':'pointer',opacity:aiState?0.7:1}}>
            ✨ {aiState==='gen'?'...':'IA'}
          </button>
        </div>
      </div>
      <div style={{fontSize:'0.65rem',color:'#4a6580',marginBottom:8}}>✨ IA = gera do zero &nbsp;|&nbsp; 💄 Embelezar = só formata (preserva o texto)</div>

      <div style={{marginBottom:8}}>
        <div style={{fontSize:'0.65rem',color:'#64748b',marginBottom:4}}>📸 Fotos ({imgs.length}/3)</div>
        {imgs.length > 0 && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:4,marginBottom:6}}>
            {imgs.map((img,i)=>(
              <div key={i} style={{position:'relative'}}>
                <img src={img} alt="" style={{width:'100%',height:60,objectFit:'cover',objectPosition:'center',borderRadius:4,display:'block'}}/>
                <button onClick={()=>onRemoveImg(i)} style={{position:'absolute',top:2,right:2,background:'rgba(0,0,0,0.75)',border:'none',borderRadius:3,color:'#fff',cursor:'pointer',padding:'1px 5px',fontSize:'0.65rem'}}>×</button>
              </div>
            ))}
          </div>
        )}
        {imgs.length < 3 && (
          <div className={`et-dropzone ${dragOver?'drop-active':''}`}
            onDragOver={e=>{e.preventDefault();e.stopPropagation();setDragOver(true);}}
            onDragLeave={e=>{e.preventDefault();setDragOver(false);}}
            onDrop={handleFileDrop}>
            <div style={{display:'flex',gap:4,marginBottom:4}}>
              <input type="text" value={imgInput} onChange={e=>setImgInput(e.target.value)} className="et-input" placeholder="URL da imagem..." style={{flex:1,fontSize:'0.75rem'}}
                onKeyDown={e=>{if(e.key==='Enter' && imgInput){onAddImg(imgInput);setImgInput('');}}}/>
              <button onClick={()=>{if(imgInput){onAddImg(imgInput);setImgInput('');}}} className="et-btn-ghost">⬇</button>
            </div>
            <div style={{display:'flex',gap:4}}>
              <button onClick={()=>window.open(`https://www.google.com/search?tbm=isch&q=${encodeURIComponent((svc.title||svc.type)+' turismo luxo')}`,'_blank')} className="et-btn-ghost" style={{flex:1,justifyContent:'center'}}>🔍 Google</button>
              <button onClick={()=>fileRef.current?.click()} className="et-btn-ghost" style={{flex:1,justifyContent:'center'}}>📁 Upload</button>
              <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{
                const f=e.target.files?.[0]; if(!f)return;
                const r=new FileReader(); r.onload=ev=>onAddImg(ev.target.result); r.readAsDataURL(f);
                e.target.value='';
              }}/>
            </div>
            <div className="et-dropzone-hint">ou arraste uma imagem aqui</div>
          </div>
        )}
      </div>

      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{color:'#64748b',fontSize:'0.8rem'}}>{CURRENCIES[currency]?.symbol}</span>
        <input type="number" step="0.01" value={svc.price} onChange={e=>onUp({price:e.target.value})} className="et-input" placeholder="0,00"/>
      </div>
    </div>
  );
}

// ============ PDF PREVIEW ============

                      <td style={{padding:'4px 5px',borderBottom:'1px solid #f1f5f9',color:'#1e293b',fontWeight:600}}>{((s.title||SVCTYPE.find(t=>t.value===s.type)?.label)||'').slice(0,22)}</td>

            </div>
          </div>

          <div style={{borderTop:`2px solid ${gold}`,paddingTop:8,marginTop:6}}>
            <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:6}}>
              <div style={{fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'0.1em',color:'#94a3b8'}}>Investimento</div>
              <h2 style={{fontSize:'1.15rem',fontWeight:900,color:'#00294d',margin:0,fontFamily:'Playfair Display,Georgia,serif'}}>Valores</h2>
            </div>
            {quote.services.map((s,i)=>(
              <div key={s.id} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:'1px solid #f1f5f9',fontSize:'0.72rem',color:'#475569'}}>
                <span><b style={{color:'#94a3b8',marginRight:6}}>{String(i+1).padStart(2,'0')}</b>{s.title||SVCTYPE.find(t=>t.value===s.type)?.label}</span>
                <span style={{fontWeight:700,color:'#1e293b'}}>{fmt(s.price,quote.currency)}</span>
              </div>
            ))}
            <div style={{marginTop:8,background:'#00294d',borderRadius:8,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><div style={{fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'0.1em',color:gold}}>Total</div><div style={{fontSize:'1.4rem',fontWeight:900,color:'#fff'}}>{fmt(total,quote.currency)}</div></div>
              {quote.trip.travelers>0&&total>0&&<div style={{textAlign:'right'}}><div style={{fontSize:'0.6rem',color:'#94a3b8',textTransform:'uppercase'}}>Por pessoa</div><div style={{fontSize:'1rem',fontWeight:700,color:'#fff'}}>{fmt(total/quote.trip.travelers,quote.currency)}</div></div>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ HISTORY VIEW ============
function HistoryView({quotes,search,setSearch,filterStatus,setFilterStatus,loadQ,dupQ,delQ,openShare}){
  return (
    <div className="fade-in">
      <div className="et-card" style={{marginBottom:16}}>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)} className="et-input" style={{flex:1,minWidth:240}} placeholder="🔍 Buscar por cliente, destino ou título..."/>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="et-select" style={{minWidth:160}}>
            <option value="all">Todos os status</option>
            {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
      </div>
      {quotes.length===0?(
        <div className="et-card" style={{textAlign:'center',padding:'4rem'}}>
          <div style={{fontSize:48,marginBottom:12,opacity:0.5}}>📋</div>
          <div style={{color:'#64748b',fontWeight:600}}>Nenhuma proposta encontrada</div>
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
          {quotes.map(q=>{
            const tot=q.services.reduce((s,x)=>s+Number(x.price||0),0);
            const st=STATUS[q.status]||STATUS.draft;
            return (
              <div key={q.id} style={{background:'#0d2240',border:'1px solid #1e3a5f',borderRadius:12,overflow:'hidden',transition:'all 0.2s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='#d4af37';e.currentTarget.style.transform='translateY(-2px)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='#1e3a5f';e.currentTarget.style.transform='translateY(0)';}}>
                <div style={{height:4,background:st.color}}/>
                <div style={{padding:16}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <span style={{background:st.color,color:'#fff',fontSize:'0.65rem',fontWeight:700,padding:'2px 8px',borderRadius:4,boxShadow:`0 0 8px ${st.color}88`,letterSpacing:'0.04em'}}>{st.label}</span>
                    <span style={{fontSize:'0.7rem',color:'#4a6580'}}>{new Date(q.updatedAt).toLocaleDateString('pt-BR')}</span>
                  </div>
                  <div style={{fontWeight:700,color:'#e2e8f0',marginBottom:4,fontSize:'0.95rem',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{q.title}</div>
                  <div style={{fontSize:'0.8rem',color:'#94a3b8',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{q.client.name||'Sem cliente'}</div>
                  <div style={{fontSize:'0.75rem',color:'#4a6580',marginBottom:10,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📍 {q.trip.destination||'Sem destino'}</div>
                  <div style={{fontSize:'1.2rem',fontWeight:900,color:'#d4af37',marginBottom:12,fontFamily:'Playfair Display,Georgia,serif'}}>{fmt(tot,q.currency)}</div>
                  <div style={{display:'flex',gap:6,borderTop:'1px solid #1e3a5f',paddingTop:12}}>
                    <button onClick={()=>loadQ(q)} className="et-btn-gold" style={{flex:1,justifyContent:'center',fontSize:'0.8rem',padding:'0.45rem'}}>✏️ Abrir</button>
                    <button onClick={()=>dupQ(q)} className="et-btn-ghost" title="Duplicar">📋</button>
                    <button onClick={()=>openShare(q)} className="et-btn-ghost" title="Compartilhar">🔗</button>
                    <button onClick={()=>delQ(q.id,q.shareId)} className="et-btn-danger" title="Excluir">🗑</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============ SHARE VIEW ============
function ShareView({quote,total,onBack,showToast}){
  const link=`${window.location.origin}${window.location.pathname}#/p/${quote.shareId}`;
  const [copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard.writeText(link);setCopied(true);setTimeout(()=>setCopied(false),2000);showToast&&showToast('Link copiado!');};
  const whatsapp = `https://wa.me/?text=${encodeURIComponent(`Olá ${quote.client.name||''}, segue sua proposta de viagem para ${quote.trip.destination||''}: ${link}`)}`;
  const email = `mailto:${quote.client.email||''}?subject=${encodeURIComponent('Sua proposta de viagem - '+(quote.trip.destination||''))}&body=${encodeURIComponent(`Olá ${quote.client.name||''},\n\nSegue sua proposta de viagem:\n${link}\n\nAtenciosamente,\nExpert Turismo`)}`;
  return (
    <div style={{minHeight:'100vh',background:'#07172a',padding:'1.5rem'}} className="fade-in">
      <div style={{maxWidth:760,margin:'0 auto'}}>
        <button onClick={onBack} style={{background:'transparent',border:'none',color:'#d4af37',cursor:'pointer',fontWeight:600,marginBottom:16,fontFamily:'inherit'}}>← Voltar ao editor</button>
        <div className="et-card" style={{marginBottom:16}}>
          <div style={{color:'#d4af37',fontWeight:700,fontSize:'1rem',marginBottom:8}}>🔗 Compartilhar proposta</div>
          <div style={{fontSize:'0.85rem',color:'#64748b',marginBottom:12}}>O link abre uma versão somente-leitura da proposta. Funciona em qualquer dispositivo.</div>
          <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
            <input type="text" value={link} readOnly className="et-input" style={{flex:1,fontFamily:'monospace',fontSize:'0.78rem',minWidth:240}}/>
            <button onClick={copy} className="et-btn-gold">{copied?'✓ Copiado!':'📋 Copiar'}</button>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <a href={whatsapp} target="_blank" rel="noopener" style={{textDecoration:'none'}}><button className="et-btn-ghost" style={{borderColor:'#16a34a',color:'#4ade80'}}>💬 WhatsApp</button></a>
            <a href={email} style={{textDecoration:'none'}}><button className="et-btn-ghost" style={{borderColor:'#2563eb',color:'#60a5fa'}}>📧 Email</button></a>
          </div>
        </div>
        <div className="et-card">
          <div style={{fontSize:'0.7rem',color:'#4a6580',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:12}}>Prévia</div>
          <PDFPreview quote={quote} total={total}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
